<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/login.css">
    <title>PixelArchives - Connexion</title>
</head>
    <body>
        <header>
            <div class="HeadTitle">
                <h1><a href="./index.html">PixelArchives</a></h1>
            </div>
            <ul class="HeaderLinks">
                <li><a href="./index.html">Accueil</a></li>
                <li><a href="./login.html">Connexion</a></li>
                <li><a href="./register.html">Créer un compte</a></li>
                <li><a href="https://www.youtube.com/watch?v=SbYXkOAoZpI">TEST</a></li>
            </ul>
        </header>
    <main>
        <section class="LoginSection">
            <h2>Connexion</h2>
            <div id="ErrorLogin" class="ErrorMsg">
                Identifiant ou Mot de passe incorrect!
            </div>
            <form action="#" method="POST" class="LoginForm">
                <div class="UsrLabel"><label for="Username">Identifiant ou Email</label></div>
                <input type="text" name="Username" required>
                    <div class="PwdLabel"><label for="Password">Mot de passe</label></div>
                    <div class="HiddenPwd">
                        <input type="password" id="password" name="Password" required>
                        <span id="togglePassword" class="toggle-eye">🔐</span>
                    </div>
                <button type="submit">Se Connecter</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="Copyright">
            <h3>2025, All rights reserved</h3>
        </div>
    </footer>
    <script>
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");

        togglePassword.addEventListener("click", function () {
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            this.textContent = type === "password" ? "🔐" : "👁️‍🗨️";
        });
    </script>
</body>
</html>
